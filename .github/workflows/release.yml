name: "Release"

on:
  push:
    branches:
      - main
    tags:
      - '*.*.*'
      - 'v*.*.*'

jobs:
  publish-snapshot:
    name: "Publish snapshot to Sonatype"
    if: github.repository == 'detekt/sarif4k' && github.ref_type == 'branch'
    runs-on: macos-latest

    permissions:
      contents: read

    steps:
      - name: "Checkout sources"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: "Set up Java"
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: 'zulu'
          java-version-file: '.java-version'

      - name: "Setup gradle"
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: "Build"
        run: ./gradlew build

      - name: "Publish snapshot"
        run: ./gradlew publishToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_SONATYPE_PASSWORD }}

  publish-release:
    name: "Publish release to Sonatype"
    if: github.repository == 'detekt/sarif4k' && github.ref_type == 'tag'
    runs-on: macos-latest
    environment:
      name: release

    permissions:
      contents: write

    steps:
      - name: "Checkout sources"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: "Set up Java"
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: 'zulu'
          java-version-file: '.java-version'

      - name: "Setup gradle"
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: "Resolve release version"
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: "Validate release version"
        run: |
          if [[ "$RELEASE_VERSION" == *-SNAPSHOT ]]; then
            echo "Release tags must resolve to a non-SNAPSHOT version"
            exit 1
          fi

      - name: "Build"
        run: ./gradlew build -PVERSION="$RELEASE_VERSION"

      - name: "Publish release"
        run: ./gradlew publishToMavenCentral -PVERSION="$RELEASE_VERSION" -PsignAllPublications=true
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_SIGNING_PWD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_SONATYPE_PASSWORD }}

      - name: "Create GitHub release"
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "$RELEASE_VERSION"
